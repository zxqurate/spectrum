$mainMod = SUPER
$terminal = kitty
$menu = bash ~/.config/rofi/launch.sh -show drun
$browser = bash ~/.config/hypr/scripts/open-browser.sh
$fileManager = bash ~/.config/hypr/scripts/open-file-manager.sh

bind = SUPER, Return, exec, $terminal
bind = $mainMod, D, exec, $menu
bind = $mainMod, W, exec, $browser
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, Q, killactive
bind = $mainMod, M, exit
bind = $mainMod, V, togglefloating
bind = $mainMod, P, pseudo
bind = $mainMod, J, layoutmsg, togglesplit
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, Space, global, quickshell:cc-toggle
bind = SUPER, L, global, quickshell:lock-screen
bind = $mainMod, slash, global, quickshell:keybind-manager
bind = $mainMod CTRL, T, global, quickshell:wallpaper-picker

# Screenshots (save to ~/Pictures/Screenshots + clipboard)
bind = $mainMod SHIFT, S, exec, bash ~/.config/hypr/scripts/screenshot.sh area
bind = $mainMod SHIFT, F, exec, bash ~/.config/hypr/scripts/screenshot.sh full

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Quickshell: show workspace numbers while Super is held
bind = , Super_L, global, quickshell:super-down
bindr = , Super_L, global, quickshell:super-up
bind = , Super_R, global, quickshell:super-down
bindr = , Super_R, global, quickshell:super-up


# BEGIN QUICKSHELL SETTINGS PANEL
bind = SHIFT, Alt_L, exec, hyprctl switchxkblayout all next
# END QUICKSHELL SETTINGS PANEL
