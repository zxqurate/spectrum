# Window rules — add as needed

# Rofi
layerrule = match:namespace rofi, blur on, ignore_alpha 0.65

# Quickshell — bar, popups, side panel, control center (namespace quickshell)
# ignore_alpha slightly below panel opacity so blur applies to glass surfaces
layerrule = match:namespace quickshell, blur on, ignore_alpha 0.72

# Lock screen
layerrule = match:namespace quickshell-lock, blur on, ignore_alpha 0.72
