# Window rules — add as needed

# Rofi
layerrule = blur on, match:namespace rofi
layerrule = ignore_alpha 0.04, match:namespace rofi

# Quickshell — bar, popups, side panel, control center (namespace quickshell)
# Blur size/passes: decoration.blur in appearance.conf
layerrule = blur on, match:namespace quickshell
layerrule = ignore_alpha 0.04, match:namespace quickshell

# Lock screen
layerrule = blur on, match:namespace quickshell-lock
layerrule = ignore_alpha 0.04, match:namespace quickshell-lock
